<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Web OS</title>
    <link rel="stylesheet" href="style.css" />
    <script src="./javascript/script.js" type="module" defer></script>
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <div class="screen"></div>

    <div class="taskbar">
        <!-- Left: Start button -->
        <div class="taskbar-start" id="taskbar-start">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <rect x="0" y="0" width="7" height="7" rx="1" fill="#f35" />
                <rect x="9" y="0" width="7" height="7" rx="1" fill="#4af" />
                <rect x="0" y="9" width="7" height="7" rx="1" fill="#4cf" />
                <rect x="9" y="9" width="7" height="7" rx="1" fill="#4d4" />
            </svg>
        </div>

        <!-- Center: Search -->
        <div class="taskbar-search-wrap">
            <div class="taskbar-search-icon">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                    <circle cx="5.5" cy="5.5" r="4" stroke="currentColor" stroke-width="1.4" />
                    <line x1="8.5" y1="8.5" x2="12" y2="12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
                </svg>
            </div>
            <input placeholder="Search apps..."
                   class="webos_taskbar_input"
                   autocomplete="off"
                   autocorrect="off"
                   spellcheck="false" />
            <div class="suggestion" id="suggestion"></div>
        </div>

        <!-- Right: System tray -->
        <div class="taskbar-tray">
            <div class="tray-item" id="tray-time">
                <span id="tray-clock">00:00</span>
                <span id="tray-date">Mon 1 Jan</span>
            </div>
            <div class="tray-item tray-icon" title="Network">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M7 11.5a.75.75 0 100 1.5.75.75 0 000-1.5z" fill="currentColor" />
                    <path d="M4.5 9.5C5.3 8.7 6.1 8.3 7 8.3s1.7.4 2.5 1.2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
                    <path d="M2 7c1.4-1.4 3-2.1 5-2.1s3.6.7 5 2.1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
                    <path d="M0 4.5C1.8 2.7 4.3 1.5 7 1.5s5.2 1.2 7 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
                </svg>
            </div>
            <div class="tray-item tray-icon" title="Volume">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M2 5h2.5L8 2.5v9L4.5 9H2V5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" />
                    <path d="M10 4.5c.8.7 1.3 1.6 1.3 2.5s-.5 1.8-1.3 2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
                </svg>
            </div>
        </div>
    </div>

    <!-- Start menu -->
    <div class="start-menu hidden" id="start-menu">
        <div class="start-menu-header">
            <span class="start-menu-title">WebOS</span>
        </div>
        <div class="start-menu-apps" id="start-menu-apps"></div>
    </div>
</body>
</html>
